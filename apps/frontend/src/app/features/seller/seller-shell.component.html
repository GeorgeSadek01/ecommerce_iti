<section class="seller-shell container py-4 py-md-5">
    <header class="seller-header card border-0 shadow-sm mb-4">
        <div class="card-body p-3 p-md-4 d-flex justify-content-between align-items-start flex-wrap gap-3">
            <div>
                <h1 class="h3 mb-1">Seller Dashboard</h1>
                <p class="text-secondary mb-0">Manage your store, products, and earnings from one place.</p>
            </div>

            @if (authService.currentUser(); as user) {
            <div class="seller-user-chip">
                <span class="fw-semibold">{{ user.firstName }} {{ user.lastName }}</span>
                <small class="text-uppercase">{{ user.role }}</small>
            </div>
            }
        </div>
    </header>

    <nav class="card border-0 shadow-sm mb-4">
        <div class="card-body p-2">
            <div class="nav nav-pills seller-tabs" role="tablist" aria-label="Seller navigation">
                <a class="nav-link" routerLink="/seller/dashboard" routerLinkActive="active"
                    [routerLinkActiveOptions]="{ exact: true }">Overview</a>
                <a class="nav-link" routerLink="/seller/products" routerLinkActive="active">Products</a>
                <a class="nav-link" routerLink="/seller/earnings" routerLinkActive="active">Earnings</a>
                <a class="nav-link" routerLink="/seller/settings" routerLinkActive="active">Settings</a>
                <a class="nav-link" routerLink="/seller/onboarding" routerLinkActive="active">Store Setup</a>
            </div>
        </div>
    </nav>

    <router-outlet></router-outlet>
</section>
